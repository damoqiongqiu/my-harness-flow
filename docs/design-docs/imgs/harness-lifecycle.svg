<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 640" role="img">
  <title>Harness 框架生命周期</title>
  <desc>my-harness-flow 框架生命周期：my-harness-cli.sh 通过 install / upgrade / status 三大入口管理 harness，升级按 manifest 基线三态无损判定。</desc>

  <rect width="680" height="640" fill="transparent"/>

  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: sans-serif; }
    .tt { font-size: 16px; font-weight: 600; fill: #CECBF6; }
    .th { font-size: 13px; font-weight: 500; fill: #CECBF6; }
    .ts { font-size: 11px; fill: #5DCAA5; }
    .tm { font-size: 11px; fill: #B5D4F4; }
    .tw { font-size: 11px; fill: #F5C4B3; }
    .tg { font-size: 11px; fill: #D3D1C7; }
    .tp { font-size: 11px; fill: #AFA9EC; }
    .ta { font-size: 11px; fill: #EF9F27; }
    .box-green { fill: #173404; stroke: #97C459; stroke-width: 0.5; }
    .box-blue  { fill: #042C53; stroke: #85B7EB; stroke-width: 0.5; }
    .box-purple{ fill: #26215C; stroke: #AFA9EC; stroke-width: 0.5; }
    .box-amber { fill: #412402; stroke: #EF9F27; stroke-width: 0.5; }
    .box-coral { fill: #4A1B0C; stroke: #F0997B; stroke-width: 0.5; }
    .box-dark  { fill: #1A1A2E; stroke: #3E3E5C; stroke-width: 0.5; }
  </style>

  <!-- 标题 -->
  <text x="340" y="24" text-anchor="middle" class="tt">Harness 框架生命周期</text>

  <!-- 框架源 -->
  <rect x="245" y="40" width="190" height="36" rx="8" class="box-purple"/>
  <text x="340" y="58" text-anchor="middle" dominant-baseline="central" class="th">my-harness-flow</text>

  <!-- CLI -->
  <line x1="340" y1="76" x2="340" y2="96" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a)"/>
  <rect x="200" y="98" width="280" height="36" rx="8" class="box-dark"/>
  <text x="340" y="116" text-anchor="middle" dominant-baseline="central" class="th">my-harness-cli.sh</text>

  <!-- 三分岔：从 CLI 底部（340,134）分横线到三列中心，再各自下探 -->
  <line x1="340" y1="134" x2="340" y2="144" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="210" y1="144" x2="570" y2="144" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="210" y1="144" x2="210" y2="158" stroke="#97C459" stroke-width="1" marker-end="url(#a)"/>
  <line x1="420" y1="144" x2="420" y2="158" stroke="#85B7EB" stroke-width="1" marker-end="url(#a)"/>
  <line x1="570" y1="144" x2="570" y2="158" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a)"/>

  <!-- 列标签 -->
  <text class="ts" x="210" y="150" text-anchor="middle" font-weight="600">install</text>
  <text class="tm" x="420" y="150" text-anchor="middle" font-weight="600">upgrade</text>
  <text class="tp" x="570" y="150" text-anchor="middle" font-weight="600">status</text>

  <!-- ═══════ install 列 ═══════ -->
  <rect x="150" y="164" width="120" height="36" rx="8" class="box-green"/>
  <text x="210" y="182" text-anchor="middle" dominant-baseline="central" class="th">状态检测</text>

  <!-- 分叉到 全新工程 / 老项目 -->
  <line x1="210" y1="200" x2="210" y2="210" stroke="#97C459" stroke-width="1"/>
  <line x1="180" y1="210" x2="240" y2="210" stroke="#97C459" stroke-width="1"/>
  <line x1="180" y1="210" x2="180" y2="224" stroke="#97C459" stroke-width="1" marker-end="url(#a)"/>
  <line x1="240" y1="210" x2="240" y2="224" stroke="#97C459" stroke-width="1" marker-end="url(#a)"/>

  <rect x="130" y="226" width="100" height="36" rx="8" class="box-green"/>
  <text x="180" y="244" text-anchor="middle" dominant-baseline="central" class="th">全新工程</text>
  <text class="ts" x="180" y="272" text-anchor="middle">静默安装</text>

  <rect x="240" y="226" width="100" height="36" rx="8" class="box-green"/>
  <text x="290" y="244" text-anchor="middle" dominant-baseline="central" class="th">老项目</text>
  <text class="ts" x="290" y="272" text-anchor="middle">冲突确认</text>

  <!-- 汇聚到 manifest -->
  <line x1="180" y1="276" x2="180" y2="294" stroke="#97C459" stroke-width="1"/>
  <line x1="290" y1="276" x2="290" y2="294" stroke="#97C459" stroke-width="1"/>
  <line x1="180" y1="294" x2="290" y2="294" stroke="#97C459" stroke-width="1"/>
  <line x1="235" y1="294" x2="235" y2="314" stroke="#EF9F27" stroke-width="1" marker-end="url(#a)"/>

  <rect x="155" y="316" width="160" height="36" rx="8" class="box-amber"/>
  <text x="235" y="334" text-anchor="middle" dominant-baseline="central" class="ta">生成 manifest 基线</text>
  <text class="tg" x="235" y="362" text-anchor="middle">sha256 受管文件清单</text>

  <!-- ═══════ upgrade 列 ═══════ -->
  <rect x="350" y="164" width="140" height="36" rx="8" class="box-blue"/>
  <text x="420" y="182" text-anchor="middle" dominant-baseline="central" class="th">按 manifest 三态判定</text>

  <line x1="420" y1="200" x2="420" y2="224" stroke="#85B7EB" stroke-width="1" marker-end="url(#a)"/>

  <rect x="350" y="226" width="140" height="36" rx="8" class="box-blue"/>
  <text x="420" y="244" text-anchor="middle" dominant-baseline="central" class="th">未定制</text>
  <text class="tm" x="420" y="274" text-anchor="middle">→ 本地哈希 == 基线，自动更新</text>

  <line x1="420" y1="262" x2="420" y2="284" stroke="#85B7EB" stroke-width="1" marker-end="url(#a)"/>

  <rect x="350" y="286" width="140" height="36" rx="8" class="box-amber"/>
  <text x="420" y="304" text-anchor="middle" dominant-baseline="central" class="ta">已定制</text>
  <text class="ta" x="420" y="332" text-anchor="middle">→ 本地保留</text>
  <text class="tg" x="420" y="346" text-anchor="middle">框架新版另存 *.harness</text>

  <line x1="420" y1="322" x2="420" y2="350" stroke="#EF9F27" stroke-width="1" marker-end="url(#a)"/>

  <rect x="350" y="354" width="140" height="36" rx="8" class="box-coral"/>
  <text x="420" y="372" text-anchor="middle" dominant-baseline="central" class="tw">已废弃</text>
  <text class="tw" x="420" y="400" text-anchor="middle">→ 仅报告，不自动删除</text>

  <!-- ═══════ status 列 ═══════ -->
  <rect x="510" y="164" width="120" height="36" rx="8" class="box-purple"/>
  <text x="570" y="182" text-anchor="middle" dominant-baseline="central" class="th">框架版本</text>

  <line x1="570" y1="200" x2="570" y2="224" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a)"/>

  <rect x="510" y="226" width="120" height="36" rx="8" class="box-purple"/>
  <text x="570" y="244" text-anchor="middle" dominant-baseline="central" class="th">已装版本</text>
  <text class="tp" x="570" y="272" text-anchor="middle">version= 字段</text>

  <line x1="570" y1="262" x2="570" y2="284" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a)"/>

  <rect x="510" y="286" width="120" height="36" rx="8" class="box-purple"/>
  <text x="570" y="304" text-anchor="middle" dominant-baseline="central" class="th">差异摘要</text>
  <text class="tp" x="570" y="332" text-anchor="middle">与框架版本对比</text>

  <line x1="570" y1="322" x2="570" y2="342" stroke="#AFA9EC" stroke-width="1" marker-end="url(#a)"/>

  <rect x="510" y="354" width="120" height="36" rx="8" class="box-purple"/>
  <text x="570" y="372" text-anchor="middle" dominant-baseline="central" class="th">下一步指引</text>

  <!-- 底部总结 -->
  <text class="tg" x="340" y="440" text-anchor="middle" font-size="11px">无论 install / upgrade / status，定制内容永远不会被静默覆盖</text>

  <!-- 图例 -->
  <g transform="translate(100, 456)">
    <rect x="0" y="0" width="480" height="44" rx="8" fill="#1A1A2E" stroke="#3E3E5C" stroke-width="0.5"/>
    <rect x="12" y="16" width="12" height="10" rx="3" fill="#173404" stroke="#97C459" stroke-width="0.5"/>
    <text class="ts" x="30" y="25" font-size="10px">install</text>
    <rect x="80" y="16" width="12" height="10" rx="3" fill="#042C53" stroke="#85B7EB" stroke-width="0.5"/>
    <text class="tm" x="98" y="25" font-size="10px">upgrade</text>
    <rect x="160" y="16" width="12" height="10" rx="3" fill="#26215C" stroke="#AFA9EC" stroke-width="0.5"/>
    <text class="tp" x="178" y="25" font-size="10px">status</text>
    <rect x="230" y="16" width="12" height="10" rx="3" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
    <text class="ta" x="248" y="25" font-size="10px">manifest 基线</text>
    <rect x="340" y="16" width="12" height="10" rx="3" fill="#4A1B0C" stroke="#F0997B" stroke-width="0.5"/>
    <text class="tw" x="358" y="25" font-size="10px">已废弃</text>
  </g>
</svg>