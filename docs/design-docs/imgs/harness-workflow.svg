<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" role="img">
  <title>Harness 任务工作流</title>
  <desc>my-harness-flow 任务级工作流：4 入口 → start-task 中枢决策 → spec 分岔 → quality-gate 验证 → finish-task 交付。含 FAIL 回环诊断 + 中途辅助技能。</desc>

  <rect x="0" y="0" width="680" height="560" fill="transparent"/>
  <text x="340" y="24" text-anchor="middle" font-family="var(--font-sans, sans-serif)" font-size="16px" font-weight="500" fill="#CECBF6">Harness 任务工作流</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    text { font-family: var(--font-sans, sans-serif); }
    .t { font-size: 14px; font-weight: 500; fill: #CECBF6; }
    .ts { font-size: 12px; font-weight: 400; fill: #5DCAA5; }
    .tm { font-size: 13px; font-weight: 400; fill: #B5D4F4; }
    .tw { font-size: 13px; font-weight: 400; fill: #F5C4B3; }
    .tg { font-size: 12px; font-weight: 400; fill: #D3D1C7; }
    .ed { font-size: 12px; font-weight: 400; fill: #C0DD97; }
    .box-teal { fill: #04342C; stroke: #5DCAA5; stroke-width: 0.5; }
    .box-purple { fill: #26215C; stroke: #AFA9EC; stroke-width: 0.5; }
    .box-blue { fill: #042C53; stroke: #85B7EB; stroke-width: 0.5; }
    .box-green { fill: #173404; stroke: #97C459; stroke-width: 0.5; }
    .box-coral { fill: #4A1B0C; stroke: #F0997B; stroke-width: 0.5; }
    .box-amber { fill: #412402; stroke: #EF9F27; stroke-width: 0.5; }
    .box-gray { fill: #2C2C2A; stroke: #B4B2A9; stroke-width: 0.5; }
  </style>

  <g class="box-teal">
    <rect x="40" y="50" width="130" height="44" rx="8"/>
    <text class="t" x="105" y="72" text-anchor="middle" dominant-baseline="central">发现 bug</text>
  </g>
  <g class="box-teal">
    <rect x="195" y="50" width="130" height="44" rx="8"/>
    <text class="t" x="260" y="72" text-anchor="middle" dominant-baseline="central">接到需求</text>
  </g>
  <g class="box-teal">
    <rect x="350" y="50" width="130" height="44" rx="8"/>
    <text class="t" x="415" y="72" text-anchor="middle" dominant-baseline="central">主动重构</text>
  </g>
  <g class="box-gray">
    <rect x="510" y="50" width="130" height="44" rx="8"/>
    <text class="t" x="575" y="72" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">日常巡检</text>
  </g>
  <text class="tg" x="575" y="114" text-anchor="middle" dominant-baseline="central">直说命令</text>

  <g class="box-coral">
    <rect x="40" y="130" width="130" height="44" rx="8"/>
    <text class="tw" x="105" y="152" text-anchor="middle" dominant-baseline="central">diagnose</text>
  </g>

  <line x1="105" y1="94" x2="105" y2="130" stroke="#F0997B" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="260" y1="94" x2="260" y2="176" stroke="#AFA9EC" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="415" y1="94" x2="415" y2="150" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="415" y1="150" x2="370" y2="150" stroke="#AFA9EC" stroke-width="1"/>
  <line x1="370" y1="150" x2="370" y2="176" stroke="#AFA9EC" stroke-width="1" marker-end="url(#arr)"/>

  <line x1="170" y1="152" x2="265" y2="152" stroke="#F0997B" stroke-width="1"/>
  <line x1="265" y1="152" x2="265" y2="176" stroke="#F0997B" stroke-width="1" marker-end="url(#arr)"/>

  <g class="box-purple">
    <rect x="200" y="176" width="240" height="56" rx="8"/>
    <text class="t" x="320" y="194" text-anchor="middle" dominant-baseline="central">start-task</text>
    <text class="ts" x="320" y="216" text-anchor="middle" dominant-baseline="central">定档 + spec 决策 + 建分支</text>
  </g>

  <text class="ts" x="180" y="266" text-anchor="middle">需要 spec</text>
  <text class="tm" x="420" y="266" text-anchor="middle">不需 spec</text>
  <line x1="260" y1="232" x2="260" y2="260" stroke="#5DCAA5" stroke-width="1"/>
  <line x1="260" y1="260" x2="80" y2="260" stroke="#5DCAA5" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="80" y1="260" x2="80" y2="290" stroke="#EF9F27" stroke-width="1" marker-end="url(#arr)"/>

  <line x1="380" y1="232" x2="380" y2="260" stroke="#85B7EB" stroke-width="1"/>
  <line x1="380" y1="260" x2="380" y2="290" stroke="#85B7EB" stroke-width="1" marker-end="url(#arr)"/>

  <g class="box-amber">
    <rect x="40" y="290" width="200" height="56" rx="8"/>
    <text class="t" x="140" y="308" text-anchor="middle" dominant-baseline="central" fill="#EF9F27">spec-driven-implementation</text>
    <text class="tg" x="140" y="326" text-anchor="middle" dominant-baseline="central">写 product + tech spec</text>
  </g>

  <line x1="240" y1="318" x2="270" y2="318" stroke="#EF9F27" stroke-width="1"/>
  <line x1="270" y1="318" x2="270" y2="204" stroke="#EF9F27" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <g class="box-blue">
    <rect x="200" y="290" width="240" height="56" rx="8"/>
    <text class="t" x="320" y="308" text-anchor="middle" dominant-baseline="central" fill="#CECBF6">quality-gate</text>
    <text class="tm" x="320" y="326" text-anchor="middle" dominant-baseline="central">L1-L5 分层验证</text>
  </g>

  <g class="box-green">
    <rect x="200" y="370" width="240" height="56" rx="8"/>
    <text class="t" x="320" y="388" text-anchor="middle" dominant-baseline="central">finish-task</text>
    <text class="ed" x="320" y="406" text-anchor="middle" dominant-baseline="central">提交 + 留痕 + 归档</text>
  </g>

  <line x1="320" y1="346" x2="320" y2="370" stroke="#97C459" stroke-width="1" marker-end="url(#arr)"/>

  <text class="tw" x="460" y="318" text-anchor="start">FAIL</text>
  <line x1="440" y1="318" x2="500" y2="318" stroke="#F0997B" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="500" y1="318" x2="500" y2="152" stroke="#F0997B" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="500" y1="152" x2="170" y2="152" stroke="#F0997B" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr)"/>

  <text class="tg" x="575" y="148" text-anchor="middle">中途辅助</text>

  <g class="box-gray">
    <rect x="510" y="166" width="130" height="36" rx="8"/>
    <text class="t" x="575" y="184" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">session-start</text>
  </g>
  <g class="box-gray">
    <rect x="510" y="214" width="130" height="36" rx="8"/>
    <text class="t" x="575" y="232" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">resolve-merge-conflicts</text>
  </g>
  <g class="box-gray">
    <rect x="510" y="262" width="130" height="36" rx="8"/>
    <text class="t" x="575" y="280" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">git-worktree</text>
  </g>
  <g class="box-gray">
    <rect x="510" y="310" width="130" height="36" rx="8"/>
    <text class="t" x="575" y="328" text-anchor="middle" dominant-baseline="central" fill="#B4B2A9">retrospect</text>
  </g>

  <rect x="40" y="436" width="600" height="36" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="t" x="60" y="455" dominant-baseline="central" fill="#5DCAA5">入口</text>
  <rect x="100" y="445" width="16" height="16" rx="4" fill="#04342C" stroke="#5DCAA5" stroke-width="0.5"/>
  <text class="t" x="145" y="455" dominant-baseline="central" fill="#AFA9EC">中枢</text>
  <rect x="185" y="445" width="16" height="16" rx="4" fill="#26215C" stroke="#AFA9EC" stroke-width="0.5"/>
  <text class="t" x="230" y="455" dominant-baseline="central" fill="#EF9F27">Spec 分支</text>
  <rect x="300" y="445" width="16" height="16" rx="4" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text class="t" x="345" y="455" dominant-baseline="central" fill="#85B7EB">验证</text>
  <rect x="385" y="445" width="16" height="16" rx="4" fill="#042C53" stroke="#85B7EB" stroke-width="0.5"/>
  <text class="t" x="430" y="455" dominant-baseline="central" fill="#F0997B">诊断</text>
  <rect x="470" y="445" width="16" height="16" rx="4" fill="#4A1B0C" stroke="#F0997B" stroke-width="0.5"/>
  <text class="t" x="515" y="455" dominant-baseline="central" fill="#B4B2A9">辅助</text>
  <rect x="555" y="445" width="16" height="16" rx="4" fill="#2C2C2A" stroke="#B4B2A9" stroke-width="0.5"/>
  <text class="t" x="600" y="455" dominant-baseline="central">交付</text>
  <rect x="105" y="445" width="16" height="16" rx="4" fill="#173404" stroke="#97C459" stroke-width="0.5"/>
</svg>