name: Create Spec From Issue

on:
  workflow_dispatch:
    inputs:
      issue:
        description: "GitHub issue number"
        required: true
      agent_login:
        description: "Agent login that can be assigned or mentioned; defaults to AGENT_LOGIN"
        required: false
        default: ""
  issues:
    types: [labeled, assigned]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: create-spec-from-issue-${{ inputs.issue || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  create-spec:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request == null &&
        (
          (github.event_name == 'issue_comment' && (inputs.agent_login != '' || vars.AGENT_LOGIN != '') && contains(github.event.comment.body, format('@{0}', inputs.agent_login || vars.AGENT_LOGIN))) ||
          (github.event.action == 'labeled' && github.event.label.name == 'ready-to-spec' && contains(github.event.issue.assignees.*.login, inputs.agent_login || vars.AGENT_LOGIN)) ||
          (github.event.action == 'assigned' && github.event.assignee.login == (inputs.agent_login || vars.AGENT_LOGIN) && contains(github.event.issue.labels.*.name, 'ready-to-spec'))
        )
        &&
        contains(github.event.issue.labels.*.name, 'ready-to-spec')
        &&
        !contains(github.event.issue.labels.*.name, 'ready-to-implement')
      )
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - name: Prepare workflow handoff directory
        id: handoff
        run: |
          dir="$GITHUB_WORKSPACE/.codex-runtime/handoff"
          rm -rf "$dir"
          mkdir -p "$dir"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"

      - name: Prepare issue context
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue || github.event.issue.number }}
          AGENT_LOGIN: ${{ inputs.agent_login || vars.AGENT_LOGIN }}
        run: |
          python3 .github/scripts/prepare_issue_spec_context.py \
            --repo "${{ github.repository }}" \
            --issue "$ISSUE_NUMBER" \
            --event-name "${{ github.event_name }}" \
            --event-path "$GITHUB_EVENT_PATH" \
            --agent-login "$AGENT_LOGIN" \
            --output "${{ steps.handoff.outputs.dir }}/issue_context.json" \
            --comments-output "${{ steps.handoff.outputs.dir }}/issue_comments.txt" \
            --github-output "$GITHUB_OUTPUT"

      - name: Stop when issue is not ready
        if: steps.issue.outputs.should_run != 'true'
        run: |
          echo "${{ steps.issue.outputs.skip_reason }}"

      - name: Install Codex sandbox prerequisites
        if: steps.issue.outputs.should_run == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Configure Codex API endpoint
        if: steps.issue.outputs.should_run == 'true'
        id: codex_endpoint
        env:
          OPENAI_API_ENDPOINT: ${{ vars.OPENAI_API_ENDPOINT }}
        run: |
          endpoint="${OPENAI_API_ENDPOINT%/}"
          if [ -z "$endpoint" ]; then
            echo "OPENAI_API_ENDPOINT is not set" >&2
            exit 1
          fi
          case "$endpoint" in
            */responses) ;;
            *) endpoint="$endpoint/responses" ;;
          esac
          echo "url=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Create specs
        if: steps.issue.outputs.should_run == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ steps.codex_endpoint.outputs.url }}
          prompt: |
            Create GitHub issue specs from the stable local context files.

            Inputs:
            - ${{ steps.handoff.outputs.dir }}/issue_context.json
            - ${{ steps.handoff.outputs.dir }}/issue_comments.txt

            Read ${{ steps.handoff.outputs.dir }}/issue_context.json first.
            Then read and use these skills in this exact order:
            1. .agents/skills/spec-driven-implementation/SKILL.md
               - Overall workflow: decide and organize spec-first work.
            2. .agents/skills/write-product-spec/SKILL.md
               - General product spec writing rules.
            3. .github/skills/create-product-spec/SKILL.md
               - GitHub issue wrapper for product specs.
            4. .agents/skills/write-tech-spec/SKILL.md
               - General tech spec writing rules.
            5. .github/skills/create-tech-spec/SKILL.md
               - GitHub issue wrapper for tech specs.

            Required outputs:
            - ${{ steps.issue.outputs.product_spec }}
            - ${{ steps.issue.outputs.tech_spec }}
            - ${{ steps.handoff.outputs.dir }}/pr-metadata.json

            This workflow is only for writing specs. Produce product.md,
            tech.md, and ${{ steps.handoff.outputs.dir }}/pr-metadata.json
            only. Do not implement the feature, modify production code, or
            begin the implement-specs phase.

            Write ${{ steps.handoff.outputs.dir }}/pr-metadata.json as a JSON
            object with:
            - branch_name: target_branch from ${{ steps.handoff.outputs.dir }}/issue_context.json
            - pr_title: concise conventional-commit style PR title, such as
              "docs(spec): create issue ${{ steps.issue.outputs.issue_number }} specs"
            - pr_summary: complete markdown PR body. It must include the exact
              non-closing issue reference "Refs #${{ steps.issue.outputs.issue_number }}".

            Respect coauthor_directives from
            ${{ steps.handoff.outputs.dir }}/issue_context.json in generated
            metadata or specs when relevant, but do not invent coauthors.

            Do not modify .agents, .github, tests, README, or production code.
            Do not run git commands, commit, push, create PRs, or call GitHub APIs.

      - name: Validate spec output
        if: steps.issue.outputs.should_run == 'true'
        run: |
          python3 .github/scripts/validate_spec_output.py \
            --context "${{ steps.handoff.outputs.dir }}/issue_context.json" \
            --metadata "${{ steps.handoff.outputs.dir }}/pr-metadata.json"

      - name: Check for spec changes
        if: steps.issue.outputs.should_run == 'true'
        id: changes
        run: |
          if [ -n "$(git status --porcelain --untracked-files=all -- "${{ steps.issue.outputs.product_spec }}" "${{ steps.issue.outputs.tech_spec }}")" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update spec pull request
        if: steps.issue.outputs.should_run == 'true' && steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 .github/scripts/finalize_spec_pr.py \
            --repo "${{ github.repository }}" \
            --context "${{ steps.handoff.outputs.dir }}/issue_context.json" \
            --metadata "${{ steps.handoff.outputs.dir }}/pr-metadata.json"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: create-spec-from-issue-${{ github.run_id }}
          path: |
            ${{ steps.handoff.outputs.dir }}/issue_context.json
            ${{ steps.handoff.outputs.dir }}/issue_comments.txt
            ${{ steps.handoff.outputs.dir }}/pr-metadata.json
