name: Update PR Review Guidance

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Look back N days"
        required: false
        default: "14"
      pr:
        description: "Single PR number, optional"
        required: false
        default: ""
      agent_login:
        description: "Comma-separated agent logins to exclude, optional"
        required: false
        default: ""
      include_bots:
        description: "Include non-agent bot comments as human feedback"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-pr-review
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Aggregate review feedback
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          args=(
            --repo "${{ github.repository }}"
            --days "${{ inputs.days }}"
            --output feedback.json
          )

          agent_login_input="${{ inputs.agent_login }}"
          if [ -n "$agent_login_input" ]; then
            IFS=',' read -ra agent_logins <<< "$agent_login_input"
            for login in "${agent_logins[@]}"; do
              login="${login#"${login%%[![:space:]]*}"}"
              login="${login%"${login##*[![:space:]]}"}"
              if [ -n "$login" ]; then
                args+=(--agent-login "$login")
              fi
            done
          fi

          if [ -n "${{ inputs.pr }}" ]; then
            args+=(--pr "${{ inputs.pr }}")
          fi

          if [ "${{ inputs.include_bots }}" = "true" ]; then
            args+=(--include-bots)
          fi

          python3 .github/skills/update-pr-review/scripts/aggregate_review_feedback.py "${args[@]}"

      - name: Install Codex sandbox prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap

      - name: Configure Codex API endpoint
        id: codex_endpoint
        env:
          OPENAI_API_ENDPOINT: ${{ vars.OPENAI_API_ENDPOINT }}
        run: |
          endpoint="${OPENAI_API_ENDPOINT%/}"
          if [ -z "$endpoint" ]; then
            echo "OPENAI_API_ENDPOINT is not set" >&2
            exit 1
          fi
          case "$endpoint" in
            */responses) ;;
            *) endpoint="$endpoint/responses" ;;
          esac
          echo "url=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Prepare guidance output directory
        run: |
          rm -rf update-pr-review-output
          mkdir -p update-pr-review-output

      - name: Update local review guidance
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          responses-api-endpoint: ${{ steps.codex_endpoint.outputs.url }}
          prompt: |
            Read .github/skills/update-pr-review/SKILL.md and follow it exactly.
            Use feedback.json as the aggregated review feedback.
            Do not edit .agents directly; it may be read-only in this sandbox.
            Write only under update-pr-review-output/.
            Always write update-pr-review-output/status.json.
            If status is changed, write complete replacement content only for:
            - update-pr-review-output/review-pr-repo/SKILL.md
            - update-pr-review-output/review-spec-repo/SKILL.md
            Use agent_comments only as context. Do not update guidance from agent_comments alone.
            Do not run git commands, commit, push, create PRs, or invoke GitHub APIs.
            Do not modify core skills, workflow files, scripts, tests, or product code.

      - name: Apply guidance output
        run: python3 .github/skills/update-pr-review/scripts/apply_guidance_output.py

      - name: Remove temporary feedback
        run: rm -rf feedback.json update-pr-review-output

      - name: Validate write surface
        run: python3 .github/skills/update-pr-review/scripts/validate_write_surface.py

      - name: Check for guidance changes
        id: changes
        run: |
          if git diff --quiet -- .github/skills/review-pr-repo .github/skills/review-spec-repo; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          branch="feat/update-pr-review"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin "+refs/heads/$branch:refs/remotes/origin/$branch" || true
          git switch -C "$branch"
          git add .github/skills/review-pr-repo .github/skills/review-spec-repo
          git commit -m "docs(skill): update PR review guidance"
          git push --force-with-lease origin "$branch"

          body="$(cat <<'EOF'
          Updates repo-local PR review guidance from recent human review feedback.

          Source:
          - days: ${{ inputs.days }}
          - pr: ${{ inputs.pr || 'all recent PRs' }}
          - agent_login: ${{ inputs.agent_login || 'default' }}
          - include_bots: ${{ inputs.include_bots }}
          EOF
          )"

          existing_pr="$(
            gh pr list \
              --repo "${{ github.repository }}" \
              --head "$branch" \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --repo "${{ github.repository }}" \
              --title "Update PR review guidance" \
              --body "$body"
          else
            gh pr create \
              --repo "${{ github.repository }}" \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$branch" \
              --title "Update PR review guidance" \
              --body "$body"
          fi
